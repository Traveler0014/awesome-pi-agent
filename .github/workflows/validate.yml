name: Validate Extensions Registry

on:
  push:
    paths:
      - "extensions.yaml"
  pull_request:
    paths:
      - "extensions.yaml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Validate extensions.yaml
        run: npm run validate
